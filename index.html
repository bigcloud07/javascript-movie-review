<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./src/styles/reset.css" />
  <link rel="stylesheet" href="./src/styles/main.css" />
  <link rel="stylesheet" href="./src/styles/tab.css" />
  <link rel="stylesheet" href="./src/styles/thumbnail.css" />
  <link rel="stylesheet" href="./src/styles/skeleton.css" />
  <link rel="stylesheet" href="./src/styles/toast.css" />
  <title>영화 리뷰</title>
</head>

<body>
  <div id="app">
    <section>
      <div class="background-container">
        <div class="overlay" aria-hidden="true"></div>
        <div class="top-rated-container container">
          <header class="header">
            <a href="%BASE_URL%">
              <img class="logo" src="/images/logo.png" alt="MovieList" />
            </a>
            <form method="get" action="/search" class="search-form">
              <input type="text" name="query" class="search-input" placeholder="검색어를 입력하세요" required />
              <button type="submit" class="search-submit">
                <img src="/svg/search.svg" alt="search" />
              </button>
            </form>
            <div class="header-dummy-item"></div>
          </header>
          <div class="top-rated-movie">
            <div class="rate">
              <img src="./images/star_empty.png" class="star" />
              <span class="rate-value">
                <div class="skeleton skeleton-top-rated-movie-rate"></div>
              </span>
            </div>
            <div class="title">
              <div class="skeleton skeleton-top-rated-movie-title"></div>
            </div>
            <button class="primary detail" disabled>자세히 보기</button>
          </div>
        </div>
      </div>
    </section>
    <div class="container">
      <main>
        <section>
          <h2 class="list-title">지금 인기 있는 영화</h2>
          <ul class="thumbnail-list"></ul>
        </section>
      </main>
    </div>

    <footer class="footer">
      <p>&copy; 우아한테크코스 All Rights Reserved.</p>
      <p><img src="./images/woowacourse_logo.png" width="180" /></p>
    </footer>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
